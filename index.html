<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <title>Frontend Mentor | Order summary card</title>
</head>
<body>
  <main class="container">
    <article class="box" aria-labelledby="order-title">
      <img class="hero-image" src="./images/illustration-hero.svg" alt="">

      <div class="bottom">
        <h1 id="order-title">Order Summary</h1>

        <p class="summary-text">
          You can now listen to millions of songs, audiobooks, and podcasts on any device anywhere you like!
        </p>

        <div class="plan">
          <img src="./images/icon-music.svg" alt="" aria-hidden="true">

          <div class="plan-info">
            <h2>Annual Plan</h2>
            <p>$59.99/year</p>
          </div>

          <a href="#" class="change">Change</a>
        </div>

        <button type="button" class="proceed">Proceed to Payment</button>
        <button type="button" class="cancel">Cancel Order</button>
      </div>
    </article>
  </main>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="#">Rami Abusaada</a>.
  </footer>
</body>
</html>
